name = "caffeineworks-mcp"
main = "src/index.js"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[vars]
ASSETS_BASE_URL = "https://raw.githubusercontent.com/caffeineworks/caffeineworks-mcp/main/assets"

[[durable_objects.bindings]]
name = "MCP_OBJECT"
class_name = "CaffeineworksMCP"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["CaffeineworksMCP"]

# 시크릿은 wrangler secret put 또는 Cloudflare Dashboard에서 설정
# GOOGLE_CLIENT_EMAIL
# GOOGLE_PRIVATE_KEY
# INQUIRY_SHEET_ID
# FEEDBACK_SHEET_ID
